<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Netflix | Seleção de perfil ." />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <title>Netflix - Selecionar perfil</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main>
      <header>
        <img src="./assets/logo.png" alt="" class="netflix-logo" />
      </header>

      <section>
        <h2>Quem está assistindo?</h2>
        <ul class="profiles">
          <li class="profile">
            <figure>
              <div class="img-box">
                <img src="./assets/profile-1.jpg" alt="Perfil 1" />
              </div>
              <figcaption>Heitor</figcaption>
            </figure>
          </li>
          <li class="profile">
            <figure>
              <img src="./assets/profile-2.jpg" alt="Perfil 2" />
              <figcaption>Guto</figcaption>
            </figure>
          </li>
          <li class="profile">
            <figure>
              <img src="./assets/profile-3.jpg" alt="Perfil 3" />
              <figcaption>Clarinha</figcaption>
            </figure>
          </li>
          <li class="add-profile">
            <div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-plus-circle-fill"
                viewBox="0 0 16 16"
              >
                <path
                  d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z"
                />
              </svg>
            </div>
            <p>Adicionar perfil</p>
          </li>
        </ul>
        <button class="bt-manage-profile">Gerenciar perfis</button>
      </section>
    </main>
  </body>
</html>
